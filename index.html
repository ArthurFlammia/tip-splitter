<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- viewport meta makes the page work on phone screens -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tip Splitter</title>
  <!-- link to the external stylesheet inside the css folder -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">
    <h1>Tip Splitter</h1>
    <p class="subtitle">Split the bill without the calculator fight.</p>

    <!-- Bill amount input -->
    <label for="bill-amount">Bill amount ($)</label>
    <input type="number" id="bill-amount" placeholder="e.g. 84.50">

    <!-- Tip percentage input -->
    <label for="tip-percent">Tip percentage (%)</label>
    <input type="number" id="tip-percent" placeholder="e.g. 18">

    <!-- Number of people input -->
    <label for="num-people">Number of people</label>
    <input type="number" id="num-people" placeholder="e.g. 4">

    <!-- Calculate runs the math, Reset clears everything -->
    <button id="calc-button">Calculate</button>
    <button id="reset-button">Reset</button>

    <!-- The results box. Starts empty, filled in by JavaScript -->
    <div id="results"></div>
  </div>

  <!-- link to the external JavaScript inside the js folder -->
  <script src="js/script.js"></script>
</body>
</html>
